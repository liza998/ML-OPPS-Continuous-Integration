name: CI Workflow 
on: 
   push:
      branches:
        - main
   pull_request:
      branches:
        - main
jobs:
    test:
      runs-on: ubuntu-latest 

      steps:
        - name: chcekout code
          uses: actions/checkout@v2 

        - name: set up python
          uses: actions/setup-python@v2
          with:
           python-version: "3.11.9"
        
        - name: Install Dependencies
          run: |
             python -m pip install --upgrade pip  
             pip install pytest streamlit

        - name: run test
          run: 
             python  _test.py 
        


        



